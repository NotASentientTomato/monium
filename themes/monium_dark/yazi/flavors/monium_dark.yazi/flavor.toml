[app]
overall =           { bg = "#bababd", fg="#333331" }

# file list
[mgr]
# the string of the current path of the selected file that is shown on top of the window. for instance "~/.local"
cwd =               { bg = "#bababd", fg = "#333331"}
# the color of the matched text string on the selected line when searching for words, using '/'
find_keyword =      { bg = "#333331", fg = "#fafafa"}
# Style of current file location in all found files to the right of the filename.
find_position =     { bg = "#ff0000", fg = "#333331" }
# Copied file marker style.
marker_copied =     { bg = "#1cce1c", fg = "#1cce1c" }
# Style of copied file number. This is the small rectangle in the upper right corner of the window,
# after the selected files have been yanked with 'y'
marker_cut =        { bg = "#ffac1c", fg = "#ffac1c" }
# Marker style of selected file in SELECT mode ('v'), 
marker_marked =     { bg = "#0099ff", fg = "#0099ff" }
# Marker style of files picked by pressing SPACEBAR to select multiple files
marker_selected =   { bg = "#0099ff", fg = "#0099ff" }
# Style of copied file number. This is the small rectangle in the upper right corner of the window, after the selected files have been cut with 'x'
count_copied =      { bg = "#1cce1c", fg = "#333331" } 
count_cut =         { bg = "#ffac1c", fg = "#333331" }
count_selected =    { bg = "#0099ff", fg = "#333331" }
# Border symbol, e.g. "Ôöé", the character that separates the window into columns.
border_symbol = "Ôöé"
border_style =      { bg = "#bababd", fg = "#aba1ac" }

# syntect_theme = "/path" # i don't know what this is. 


[indicator]
# the folder that you are in at the moment that is shown in the left column
parent =            { bg="#efefed", fg="#333331" }
# the file that is currently selected in the center column
current =           { bg="#efefed", fg="#333331" }
# the file that is or will be selected within the folder currently selected 
preview =           { bg="#efefed", fg="#333331" }
# text that is added on both ends of the indicators for parent, current and preview
# padding =           { open="", close="" }


[tabs]
# the tab that is active (press 't' to make tabs)
active =            { bg="#333331", fg="#bababd" }
# the tab that is inactive (press 't' to make tabs)
inactive =          { bg="#bababd", fg="#333331" }
# text that is added on both ends of the tab pill
# sep_inner =       { open = "", close = "" }
# sep_outer =       { open = "", close = "" }


# [mode]
# # normal_main =     { }
# # normal_alt =      { }
# # select_main =     { }
# # select_alt =      { }
# # unset_main =      { }
# # unset_alt =       { }

# the bar at the bottom of the window
[status]
# perm_* are the text characters representing the permissions a selected file has
perm_type =         { bg = "#bababd", fg = "#333331" }
perm_read =         { bg = "#bababd", fg = "#333331" }
perm_write =        { bg = "#bababd", fg = "#333331" }
perm_exec =         { bg = "#bababd", fg = "#333331" }
perm_sep =          { bg = "#bababd", fg = "#333331" }
progress_label =    { bg = "#a1a1a1", fg = "#333331" }
# this colors the seperators currently, giving the progress indicator a bad look.
# can't figure out how to preserve the rounded egdes look. 
progress_normal =   { bg = "#a1a1a1", fg = "#333331" }
progress_error =    { bg = "#ff0000", fg = "#333331" }


