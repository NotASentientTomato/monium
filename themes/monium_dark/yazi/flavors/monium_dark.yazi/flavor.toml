# Confirmation dialog. e.g. remove, overwrite, etc.
[confirm]
border =            { bg = "#bababd", fg = "#333331" }
title =             { bg = "#bababd", fg = "#000000" }
body =              { bg = "#bababd", fg = "#333331" }
list =              { bg = "#bababd", fg = "#333331" }
btn_yes =           { bg = "#cccccf", fg = "#333331" }
btn_no =            { bg = "#cccccf", fg = "#333331" }
# btn_labels = ["ok", "cancel"]


# file information spotter, opened with Tab
[spot]
border =            { bg = "#bababd", fg = "#333331" }
title =             { bg = "#bababd", fg = "#333331" }
# the background color of the column with the file data
tbl_col =           { bg = "#bababd", fg = "#333331" }
# the selected line (change with 'j', 'k')
tbl_cell =          { bg = "#efefed", fg = "#333331" }


[notify]
title_info =        { bg = "#00ff00", fg = "#333331"}
title_warn =        { bg = "#ffff70", fg = "#333331"}
title_error =       { bg = "#ff0000", fg = "#333331"}


[pick]
border =            { bg = "#bababd", fg = "#333333" }
active =            { bg = "#fffffd", fg = "#333333" }
inactive =          { bg = "#bababd", fg = "#333333" }


