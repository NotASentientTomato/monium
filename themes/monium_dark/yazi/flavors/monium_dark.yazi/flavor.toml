[filetype]
rules = [
	# Image
  { mime = "image/*", fg = "#333331" },
  # Video
  { mime = "{audio,video}/*", fg = "#333331" },
  # Empty file
  { mime = "inode/empty", fg = "#333331" },
  # Orphan symbolic links
  { url = "*", is = "orphan", bg="#ff0000", fg="#333331" },
  # Fallback
  #                 { url = "*", fg = "white" },
  { url = "*/", fg = "#333331" },

  # Media
  { mime = "{audio,video}/*", fg = "#333331" },
  # Archive
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#333331" },
  # Document
  { mime = "application/{pdf,doc,rtf}", fg = "#333331" },
  # Virtual file system
  { mime = "vfs/{absent,stale}", fg = "#333331" },
  # Special file
  { url = "*", is = "orphan", bg = "blue", fg="#efefed" },
  { url = "*", is = "exec"  , fg = "green" },
  # Dummy file
  { url = "*", is = "dummy", bg = "red" },
  { url = "*/", is = "dummy", bg = "red" },
  # Fallback
  { url = "*/", fg = "blue" }
]

